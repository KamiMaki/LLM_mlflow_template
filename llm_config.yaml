# LLM Service 配置檔 — 多模型 + 多環境支援
# 環境變數覆寫: LLM_ZONE, LLM_AUTH_TOKEN
#
# 結構：
#   shared_config  — 全域共用設定（J1→J2 auth URL 分四個 zone）
#   model_configs  — 各模型獨立設定（token、endpoint、超參數）

# 預設模型別名（對應 model_configs 中的 key），LLMService 初始化時自動使用
default_model: "QWEN3"

# === 共用設定 ===
shared_config:
  # 預設使用的環境 zone（DEV / TEST / STG / PROD），可用 LLM_ZONE 環境變數覆寫
  default_zone: "DEV"

  # J1→J2 Token Exchange 端點（每個 zone 各一個）
  auth_urls:
    DEV:  "https://auth-dev.internal.com/api/token"
    TEST: "https://auth-test.internal.com/api/token"
    STG:  "https://auth-stg.internal.com/api/token"
    PROD: "https://auth-prod.internal.com/api/token"

  # Token Exchange 共用參數
  token_field: "access_token"
  expires_field: "expires_in"
  auth_method: "bearer"          # bearer | body
  buffer_seconds: 60

  # 額外 POST body（如 grant_type）
  # extra_body:
  #   grant_type: "client_credentials"

  # 額外 HTTP headers（所有模型共用）
  # extra_headers:
  #   X-Team-Id: "your-team-id"


# === 模型設定 ===
# 每個 key 是模型別名，在 workflow 中透過 set_model("QWEN3") 切換。
model_configs:
  QWEN3:
    # J1 Token — 建議用 LLM_AUTH_TOKEN_QWEN3 環境變數傳入
    j1_token: ""

    # 模型名稱（傳給 LiteLLM 的 model 參數）
    model_name: "qwen3"

    # 各 zone 的 API endpoint
    api_endpoints:
      DEV:  "https://llm-dev.internal.com/v1"
      TEST: "https://llm-test.internal.com/v1"
      STG:  "https://llm-stg.internal.com/v1"
      PROD: "https://llm-prod.internal.com/v1"

    # 模型超參數
    max_tokens: 4096
    temperature: 0.7
    # top_p: 0.9
    # top_k: 50
    # frequency_penalty: 0.0
    # presence_penalty: 0.0
    # stop: ["\n\n"]

  QWEN3VL:
    j1_token: ""
    model_name: "qwen3-vl"

    api_endpoints:
      DEV:  "https://llm-vl-dev.internal.com/v1"
      TEST: "https://llm-vl-test.internal.com/v1"
      STG:  "https://llm-vl-stg.internal.com/v1"
      PROD: "https://llm-vl-prod.internal.com/v1"

    max_tokens: 4096
    temperature: 0.3
    # VL 模型支援圖片輸入，在 message content 中帶入 base64 image

  # 新增模型範例：
  # GPT4O:
  #   j1_token: ""
  #   model_name: "gpt-4o"
  #   api_endpoints:
  #     DEV:  "https://openai-dev.internal.com/v1"
  #     TEST: "https://openai-test.internal.com/v1"
  #     STG:  "https://openai-stg.internal.com/v1"
  #     PROD: "https://openai-prod.internal.com/v1"
  #   max_tokens: 8192
  #   temperature: 0.5
